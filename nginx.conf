# Extract the first subdomain label (project name) from the Host header.
# Only labels consisting of alphanumeric characters and hyphens are matched so
# that the variable is safe to use inside a filesystem path.
map $host $site_name {
    ~^(?<name>[a-zA-Z0-9][a-zA-Z0-9-]*)\.micro1\.sycord\.com$ $name;
    default                                                      "";
}

upstream flask_app {
    server 127.0.0.1:5000;
}

# ── Main domain ──────────────────────────────────────────────────────────────
# Serves the deployment dashboard and all API endpoints via Flask.
server {
    listen 80;
    server_name micro1.sycord.com;

    location / {
        proxy_pass http://flask_app;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffer_size        128k;
        proxy_buffers          4 256k;
        proxy_busy_buffers_size  256k;
    }
}

# ── Wildcard subdomains ───────────────────────────────────────────────────────
# Each deployed project is served directly as a static site from
# /app/deployments/<project-name>/ without involving Flask.
server {
    listen 80;
    server_name *.micro1.sycord.com;

    # Reject requests whose Host header did not match the safe pattern above.
    if ($site_name = "") {
        return 400;
    }

    root  /app/deployments/$site_name;
    index index.html;

    # Static assets – long-lived cache with immutable flag.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Everything else – SPA fallback to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
