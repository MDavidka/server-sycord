server {
    listen 80;
    server_name micro1.sycord.com *.micro1.sycord.com;

    location / {
        proxy_pass http://127.0.0.1:5000;

        # Pass the original host header to Flask so subdomain routing works
        proxy_set_header Host $host;

        # Forward the client's actual IP
        proxy_set_header X-Real-IP $remote_addr;

        # Forward the list of client IPs (useful if behind multiple proxies like Cloudflare)
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Forward the original scheme (http/https)
        proxy_set_header X-Forwarded-Proto $scheme;

        # Set buffer sizes depending on your payload
        proxy_buffer_size   128k;
        proxy_buffers   4 256k;
        proxy_busy_buffers_size   256k;
    }
}
