<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sycord · Deployment Server</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #09090b;
      --card-bg: #18181b;
      --card-border: #27272a;
      --primary: #6366f1;
      --primary-hover: #818cf8;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --text: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: rgba(9,9,11,.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--card-border);
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .nav-brand span { font-size: 20px; }
    .nav-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      background: rgba(39,39,42,.6);
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--card-border);
    }
    .pulse-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      position: relative;
    }
    .pulse-dot::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: var(--success);
      opacity: 0;
      animation: pulse 2s ease-out infinite;
    }
    .pulse-dot.offline { background: var(--error); }
    .pulse-dot.offline::after { background: var(--error); }

    @keyframes pulse {
      0% { opacity: .6; transform: scale(1); }
      100% { opacity: 0; transform: scale(2.2); }
    }

    /* CONTAINER */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 72px 24px 24px;
    }

    /* STATS ROW */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 20px;
      transition: transform .2s, box-shadow .2s;
    }
    .stat-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 24px rgba(0,0,0,.3);
    }
    .stat-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .stat-value .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .stat-value .dot.green { background: var(--success); }
    .stat-value .dot.red { background: var(--error); }
    .stat-host {
      font-size: 14px;
      font-weight: 500;
      word-break: break-all;
    }

    /* CONTENT GRID */
    .content-grid {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 24px;
    }
    .left-column, .right-column { display: flex; flex-direction: column; gap: 24px; }

    /* CARDS */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform .2s, box-shadow .2s;
    }
    .card:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 24px rgba(0,0,0,.3);
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--card-border);
    }
    .card-header h2 {
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      padding: 0 7px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 11px;
      background: rgba(99,102,241,.15);
      color: var(--primary-hover);
    }
    .card-body { padding: 16px 20px; }

    /* SEARCH */
    .search-input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 12px;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: var(--primary); }

    /* REPO LIST */
    .repo-list {
      max-height: 300px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--card-border) transparent;
    }
    .repo-list::-webkit-scrollbar { width: 6px; }
    .repo-list::-webkit-scrollbar-track { background: transparent; }
    .repo-list::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 3px; }

    .repo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background .15s, border-color .15s;
      border: 1px solid transparent;
      margin-bottom: 4px;
    }
    .repo-item:hover { background: rgba(255,255,255,.03); }
    .repo-item.selected {
      background: rgba(99,102,241,.08);
      border-color: var(--primary);
    }
    .repo-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      background: rgba(99,102,241,.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .repo-info { flex: 1; min-width: 0; }
    .repo-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .repo-id {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .repo-check {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--primary);
      display: none;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .repo-item.selected .repo-check { display: flex; }
    .repo-check svg { width: 12px; height: 12px; }

    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* SITES GRID */
    .sites-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .site-card {
      background: var(--bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-sm);
      padding: 14px;
      transition: border-color .2s;
    }
    .site-card:hover { border-color: var(--text-muted); }
    .site-name {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .site-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .site-visit {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 500;
      color: var(--primary-hover);
      text-decoration: none;
      transition: color .15s;
    }
    .site-visit:hover { color: var(--text); }

    /* DEPLOY CARD */
    .deploy-selection {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      background: var(--bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
      min-height: 60px;
    }
    .deploy-placeholder {
      color: var(--text-muted);
      font-size: 13px;
    }
    .deploy-selected-name { font-size: 14px; font-weight: 600; }
    .deploy-selected-id { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }

    .btn-deploy {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s, box-shadow .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-deploy:hover:not(:disabled) {
      background: var(--primary-hover);
      box-shadow: 0 0 20px rgba(99,102,241,.3);
    }
    .btn-deploy:active:not(:disabled) { transform: scale(.98); }
    .btn-deploy:disabled {
      opacity: .4;
      cursor: not-allowed;
    }
    .btn-deploy.loading { pointer-events: none; }
    .btn-deploy.success { background: var(--success); }
    .btn-deploy.error { background: var(--error); }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .deploy-result {
      margin-top: 16px;
      padding: 12px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      line-height: 1.6;
      display: none;
    }
    .deploy-result.show { display: block; }
    .deploy-result.result-success {
      background: rgba(16,185,129,.08);
      border: 1px solid rgba(16,185,129,.2);
      color: var(--success);
    }
    .deploy-result.result-error {
      background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.2);
      color: var(--error);
    }
    .deploy-result a {
      color: var(--primary-hover);
      text-decoration: underline;
    }

    /* CONSOLE */
    .console-body {
      background: #0a0a0a;
      padding: 12px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.7;
      max-height: 360px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--card-border) transparent;
    }
    .console-body::-webkit-scrollbar { width: 6px; }
    .console-body::-webkit-scrollbar-track { background: transparent; }
    .console-body::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 3px; }

    .log-line {
      white-space: pre-wrap;
      word-break: break-all;
      animation: fadeIn .3s ease;
    }
    .log-line .ts { color: var(--text-muted); }
    .log-line.log-error { color: var(--error); }
    .log-line.log-warning { color: var(--warning); }
    .log-line.log-info { color: var(--text-secondary); }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .auto-scroll-notice {
      display: none;
      text-align: center;
      padding: 6px;
      font-size: 11px;
      color: var(--text-muted);
      background: rgba(255,255,255,.03);
      cursor: pointer;
      border-top: 1px solid var(--card-border);
    }
    .auto-scroll-notice:hover { color: var(--text-secondary); }
    .auto-scroll-notice.show { display: block; }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 32px 24px 24px;
      font-size: 12px;
      color: var(--text-muted);
    }

    /* RESPONSIVE */
    @media (max-width: 1024px) {
      .content-grid { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .stats-row { grid-template-columns: 1fr; }
      .sites-grid { grid-template-columns: 1fr; }
      .container { padding: 68px 16px 16px; }
      nav { padding: 0 16px; }
      .stat-value { font-size: 22px; }
      .card-body { padding: 12px 16px; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-brand"><span>⚡</span> Sycord</div>
    <div class="nav-status">
      <div class="pulse-dot" id="navDot"></div>
      <span id="navStatusText">M1 · Connecting…</span>
    </div>
  </nav>

  <main class="container">
    <section class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Server Status</div>
        <div class="stat-value" id="statStatus">
          <span class="dot" id="statusDot"></span>
          <span id="statusText">—</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Repositories</div>
        <div class="stat-value" id="statRepos">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Deployed Sites</div>
        <div class="stat-value" id="statSites">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Server Host</div>
        <div class="stat-value stat-host" id="statHost">—</div>
      </div>
    </section>

    <div class="content-grid">
      <div class="left-column">

        <section class="card repos-card">
          <div class="card-header">
            <h2>📦 Repositories <span class="badge" id="repoBadge">0</span></h2>
          </div>
          <div class="card-body">
            <input type="text" class="search-input" id="repoSearch" placeholder="Search repositories…">
            <div class="repo-list" id="repoList">
              <div class="empty-state">Loading repositories…</div>
            </div>
          </div>
        </section>

        <section class="card sites-card">
          <div class="card-header">
            <h2>🌐 Deployed Sites <span class="badge" id="siteBadge">0</span></h2>
          </div>
          <div class="card-body">
            <div class="sites-grid" id="sitesGrid">
              <div class="empty-state" style="grid-column:1/-1">Loading sites…</div>
            </div>
          </div>
        </section>

      </div>

      <div class="right-column">

        <section class="card deploy-card">
          <div class="card-header">
            <h2>🚀 Deploy</h2>
          </div>
          <div class="card-body">
            <div class="deploy-selection" id="deploySelection">
              <span class="deploy-placeholder">Select a repository to deploy</span>
            </div>
            <button class="btn-deploy" id="deployBtn" disabled>Deploy</button>
            <div class="deploy-result" id="deployResult"></div>
          </div>
        </section>

        <section class="card console-card">
          <div class="card-header">
            <h2><div class="pulse-dot" style="margin-right:4px"></div> Console</h2>
          </div>
          <div class="console-body" id="consoleBody"></div>
          <div class="auto-scroll-notice" id="autoScrollNotice">↓ New logs available — click to scroll down</div>
        </section>

      </div>
    </div>
  </main>

  <footer>Sycord Deployment Server · M1 Instance</footer>

  <script>
    const $ = (s) => document.querySelector(s);
    const $$ = (s) => document.querySelectorAll(s);

    let selectedRepo = null;
    let autoScroll = true;
    let deploying = false;

    function relativeTime(dateStr) {
      if (!dateStr) return '';
      const then = new Date(dateStr).getTime();
      if (isNaN(then)) return '';
      const diff = Math.max(0, Math.floor((Date.now() - then) / 1000));
      if (diff < 60) return diff + 's ago';
      if (diff < 3600) return Math.floor(diff / 60) + ' min ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return Math.floor(diff / 86400) + 'd ago';
    }

    function animateCount(el, target) {
      const start = parseInt(el.textContent) || 0;
      if (start === target) return;
      const duration = 500;
      const startTime = performance.now();
      function tick(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.round(start + (target - start) * eased);
        if (progress < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    async function fetchHealth() {
      try {
        const res = await fetch('/api/health');
        const data = await res.json();
        $('#statusDot').className = 'dot green';
        $('#statusText').textContent = 'Healthy';
        $('#navDot').className = 'pulse-dot';
        $('#navStatusText').textContent = 'M1 · Online';
        $('#statHost').textContent = data.server_host || '—';
        if (data.deployed_sites !== undefined) {
          animateCount($('#statSites'), data.deployed_sites);
        }
      } catch {
        $('#statusDot').className = 'dot red';
        $('#statusText').textContent = 'Offline';
        $('#navDot').className = 'pulse-dot offline';
        $('#navStatusText').textContent = 'M1 · Offline';
      }
    }

    async function fetchRepos() {
      try {
        const res = await fetch('/api/repos');
        const data = await res.json();
        if (!data.success) return;
        const repos = data.repositories || [];
        animateCount($('#statRepos'), repos.length);
        $('#repoBadge').textContent = repos.length;
        renderRepos(repos);
      } catch {
        $('#repoList').innerHTML = '<div class="empty-state">Failed to load repositories</div>';
      }
    }

    function renderRepos(repos) {
      const filter = ($('#repoSearch').value || '').toLowerCase();
      const filtered = repos.filter(r => (r.full_name || r.name || '').toLowerCase().includes(filter));
      const list = $('#repoList');
      if (!filtered.length) {
        list.innerHTML = '<div class="empty-state">' + (filter ? 'No matching repositories' : 'No repositories found') + '</div>';
        return;
      }
      list.innerHTML = filtered.map(r => {
        const isSelected = selectedRepo && selectedRepo.repo_id === r.repo_id;
        return '<div class="repo-item' + (isSelected ? ' selected' : '') + '" data-id="' + r.repo_id + '">' +
          '<div class="repo-icon">📁</div>' +
          '<div class="repo-info">' +
            '<div class="repo-name">' + escapeHtml(r.full_name || r.name) + '</div>' +
            '<div class="repo-id">' + escapeHtml(String(r.repo_id)) + '</div>' +
          '</div>' +
          '<div class="repo-check"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>' +
        '</div>';
      }).join('');

      list.querySelectorAll('.repo-item').forEach(el => {
        el.addEventListener('click', () => {
          const id = el.dataset.id;
          const repo = repos.find(r => String(r.repo_id) === id);
          if (!repo) return;
          selectRepo(repo);
          renderRepos(repos);
        });
      });

      window._allRepos = repos;
    }

    function selectRepo(repo) {
      selectedRepo = repo;
      const sel = $('#deploySelection');
      sel.innerHTML = '<div class="repo-icon">📁</div><div><div class="deploy-selected-name">' +
        escapeHtml(repo.full_name || repo.name) +
        '</div><div class="deploy-selected-id">' + escapeHtml(String(repo.repo_id)) + '</div></div>';
      $('#deployBtn').disabled = false;
      $('#deployResult').className = 'deploy-result';
      $('#deployResult').style.display = 'none';
    }

    async function fetchSites() {
      try {
        const res = await fetch('/api/sites');
        const data = await res.json();
        if (!data.success) return;
        const sites = data.sites || [];
        animateCount($('#statSites'), data.total || sites.length);
        $('#siteBadge').textContent = data.total || sites.length;
        renderSites(sites);
      } catch {
        $('#sitesGrid').innerHTML = '<div class="empty-state" style="grid-column:1/-1">Failed to load sites</div>';
      }
    }

    function renderSites(sites) {
      const grid = $('#sitesGrid');
      if (!sites.length) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">No sites deployed yet</div>';
        return;
      }
      grid.innerHTML = sites.map(s => {
        const files = s.files !== undefined ? s.files + ' files' : '';
        const time = relativeTime(s.deployed_at);
        const url = s.url || s.local_url || '#';
        return '<div class="site-card">' +
          '<div class="site-name" title="' + escapeHtml(s.name) + '">' + escapeHtml(s.name) + '</div>' +
          '<div class="site-meta">' +
            (files ? '<span>' + files + '</span>' : '') +
            (time ? '<span>' + time + '</span>' : '') +
          '</div>' +
          '<a class="site-visit" href="' + escapeHtml(url) + '" target="_blank" rel="noopener">Visit ↗</a>' +
        '</div>';
      }).join('');
    }

    async function fetchLogs() {
      try {
        const params = selectedRepo ? '?project_id=' + selectedRepo.repo_id + '&limit=200' : '?limit=200';
        const res = await fetch('/api/logs' + params);
        const data = await res.json();
        if (!data.success) return;
        const logs = data.logs || [];
        const logsKey = logs.join('\n');
        if (logsKey === window._prevLogsKey) return;
        window._prevLogsKey = logsKey;
        renderLogs(logs);
      } catch {}
    }

    function renderLogs(logs) {
      const body = $('#consoleBody');
      const wasAtBottom = autoScroll;
      body.innerHTML = logs.map(line => {
        let cls = 'log-line';
        if (/\[ERROR\]/i.test(line)) cls += ' log-error';
        else if (/\[WARN(ING)?\]/i.test(line)) cls += ' log-warning';
        else cls += ' log-info';
        return '<div class="' + cls + '">' + escapeHtml(line) + '</div>';
      }).join('');
      if (wasAtBottom) {
        body.scrollTop = body.scrollHeight;
      } else {
        $('#autoScrollNotice').classList.add('show');
      }
    }

    async function doDeploy() {
      if (!selectedRepo || deploying) return;
      deploying = true;
      const btn = $('#deployBtn');
      const result = $('#deployResult');
      btn.className = 'btn-deploy loading';
      btn.innerHTML = '<div class="spinner"></div> Deploying…';
      btn.disabled = true;
      result.className = 'deploy-result';
      result.style.display = 'none';

      try {
        const res = await fetch('/api/deploy/' + selectedRepo.repo_id, { method: 'POST' });
        const data = await res.json();
        if (data.success) {
          btn.className = 'btn-deploy success';
          btn.innerHTML = '✓ Deployed';
          result.className = 'deploy-result result-success show';
          result.style.display = 'block';
          let msg = escapeHtml(data.message || 'Deployment successful');
          if (data.url) {
            msg += '<br><a href="' + escapeHtml(data.url) + '" target="_blank" rel="noopener">' + escapeHtml(data.url) + '</a>';
          }
          result.innerHTML = msg;
          fetchSites();
          fetchHealth();
        } else {
          btn.className = 'btn-deploy error';
          btn.innerHTML = '✗ Failed';
          result.className = 'deploy-result result-error show';
          result.style.display = 'block';
          result.innerHTML = escapeHtml(data.message || 'Deployment failed');
        }
      } catch (err) {
        btn.className = 'btn-deploy error';
        btn.innerHTML = '✗ Error';
        result.className = 'deploy-result result-error show';
        result.style.display = 'block';
        result.innerHTML = escapeHtml('Network error: ' + err.message);
      }

      setTimeout(() => {
        btn.className = 'btn-deploy';
        btn.innerHTML = 'Deploy';
        btn.disabled = false;
        deploying = false;
      }, 3000);
    }

    function escapeHtml(str) {
      if (str == null) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // Console auto-scroll
    const consoleBody = $('#consoleBody');
    consoleBody.addEventListener('scroll', () => {
      const atBottom = consoleBody.scrollHeight - consoleBody.scrollTop - consoleBody.clientHeight < 30;
      autoScroll = atBottom;
      if (atBottom) $('#autoScrollNotice').classList.remove('show');
    });
    $('#autoScrollNotice').addEventListener('click', () => {
      consoleBody.scrollTop = consoleBody.scrollHeight;
      autoScroll = true;
      $('#autoScrollNotice').classList.remove('show');
    });

    // Repo search
    $('#repoSearch').addEventListener('input', () => {
      if (window._allRepos) renderRepos(window._allRepos);
    });

    // Deploy button
    $('#deployBtn').addEventListener('click', doDeploy);

    // Init
    fetchHealth();
    fetchRepos();
    fetchSites();
    fetchLogs();

    setInterval(fetchLogs, 2000);
    setInterval(fetchSites, 10000);
    setInterval(fetchHealth, 15000);
  </script>

</body>
</html>
